<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-labelledby="gearTitle gearDesc">
  <title id="gearTitle">Nauti-Labs gear wheel logo</title>
  <desc id="gearDesc">A gunmetal eight-tooth gear with a bright cyan ship's helm at center. Four small accent dots at the cardinal positions represent the sub-brands: cyan (Triton) at top, purple (Castle) at right, red (Felipe) at bottom, orange (Clearance) at left.</desc>
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#00b3c8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gunmetal" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#4a5462"/>
      <stop offset="35%"  stop-color="#2a3140"/>
      <stop offset="70%"  stop-color="#161b24"/>
      <stop offset="100%" stop-color="#080a10"/>
    </linearGradient>
    <linearGradient id="helmCyan" x1="20%" y1="10%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#a8fbff"/>
      <stop offset="50%"  stop-color="#1ee0e0"/>
      <stop offset="100%" stop-color="#0a8d96"/>
    </linearGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#5cf3ff"/>
      <stop offset="100%" stop-color="#0a7c84"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <symbol id="tooth" overflow="visible">
      <path d="M -52 -195 L -46 -224 Q -42 -232 -34 -232 L 34 -232 Q 42 -232 46 -224 L 52 -195 Z"
            fill="url(#gunmetal)" stroke="#0a0d13" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M -42 -222 Q -34 -228 -28 -228 L 28 -228 Q 34 -228 42 -222"
            stroke="#5e6a7c" stroke-width="1" fill="none" opacity="0.6"/>
    </symbol>
    <symbol id="spoke" overflow="visible">
      <rect x="-4" y="-118" width="8" height="100" rx="2.5" fill="url(#helmCyan)"/>
    </symbol>
    <symbol id="handle" overflow="visible">
      <rect x="-4.5" y="-160" width="9" height="38" rx="3.5" fill="url(#helmCyan)"/>
      <circle cx="0" cy="-167" r="10" fill="url(#helmCyan)" stroke="#bafbff" stroke-width="1"/>
    </symbol>
  </defs>

  <circle cx="256" cy="256" r="248" fill="url(#halo)"/>

  <g transform="translate(256 256)">
    <use href="#tooth"/><use href="#tooth" transform="rotate(45)"/>
    <use href="#tooth" transform="rotate(90)"/><use href="#tooth" transform="rotate(135)"/>
    <use href="#tooth" transform="rotate(180)"/><use href="#tooth" transform="rotate(225)"/>
    <use href="#tooth" transform="rotate(270)"/><use href="#tooth" transform="rotate(315)"/>
  </g>
  <circle cx="256" cy="256" r="208" fill="url(#gunmetal)"/>
  <circle cx="256" cy="256" r="208" stroke="#4a5462" stroke-width="1.5" fill="none" opacity="0.7"/>
  <circle cx="256" cy="256" r="206" stroke="#0a0d13" stroke-width="1" fill="none" opacity="0.9"/>
  <circle cx="256" cy="256" r="178" fill="#03060a"/>
  <circle cx="256" cy="256" r="178" stroke="#1a2230" stroke-width="2" fill="none"/>
  <circle cx="256" cy="256" r="174" stroke="#3a4654" stroke-width="0.8" fill="none" opacity="0.5"/>

  <g filter="url(#glow)">
    <circle cx="256" cy="38"  r="10" fill="#22dde0" opacity="0.25"/>
    <circle cx="474" cy="256" r="10" fill="#b766ff" opacity="0.25"/>
    <circle cx="256" cy="474" r="10" fill="#ff2d55" opacity="0.25"/>
    <circle cx="38"  cy="256" r="10" fill="#ff8a1f" opacity="0.25"/>
    <circle cx="256" cy="38"  r="5.5" fill="#22dde0"/>
    <circle cx="474" cy="256" r="5.5" fill="#b766ff"/>
    <circle cx="256" cy="474" r="5.5" fill="#ff2d55"/>
    <circle cx="38"  cy="256" r="5.5" fill="#ff8a1f"/>
  </g>

  <g transform="translate(256 256)" filter="url(#glow)">
    <use href="#handle"/><use href="#handle" transform="rotate(45)"/>
    <use href="#handle" transform="rotate(90)"/><use href="#handle" transform="rotate(135)"/>
    <use href="#handle" transform="rotate(180)"/><use href="#handle" transform="rotate(225)"/>
    <use href="#handle" transform="rotate(270)"/><use href="#handle" transform="rotate(315)"/>
    <circle r="120" stroke="url(#helmCyan)" stroke-width="11" fill="none"/>
    <circle r="106" stroke="#7ff5ff" stroke-width="1.5" fill="none" opacity="0.75"/>
    <use href="#spoke"/><use href="#spoke" transform="rotate(45)"/>
    <use href="#spoke" transform="rotate(90)"/><use href="#spoke" transform="rotate(135)"/>
    <use href="#spoke" transform="rotate(180)"/><use href="#spoke" transform="rotate(225)"/>
    <use href="#spoke" transform="rotate(270)"/><use href="#spoke" transform="rotate(315)"/>
    <circle r="24" fill="url(#hub)"/>
    <circle r="24" stroke="#7ff5ff" stroke-width="1.5" fill="none"/>
    <circle r="6"  fill="#ffffff"/>
  </g>
</svg>
