<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triton Dashboard | Nauti-Labs</title>
  <meta name="description" content="The old lab demo is offline. Continue to the live Triton Dashboard.">
  <link rel="canonical" href="https://ops.nauti-labs.com/">
  <link rel="icon" type="image/svg+xml" href="/assets/triton-mark.svg">
  <meta http-equiv="refresh" content="0; url=https://ops.nauti-labs.com/">
  <meta name="robots" content="noindex,follow">
  <meta name="theme-color" content="#080909">
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 170, 0, 0.13), transparent 24rem),
        radial-gradient(circle at 50% 58%, rgba(198, 196, 186, 0.12), transparent 28rem),
        #070807;
      color: #f2f0e8;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(520px, calc(100vw - 32px));
      padding: 32px;
      text-align: center;
    }
    img {
      width: 136px;
      height: 136px;
      object-fit: contain;
      filter: drop-shadow(0 18px 42px rgba(255, 170, 0, 0.22));
    }
    h1 { margin: 18px 0 10px; font-size: clamp(2.2rem, 10vw, 4rem); line-height: 0.95; letter-spacing: 0; }
    p { margin: 0 auto 22px; max-width: 36rem; color: rgba(242, 240, 232, 0.72); line-height: 1.55; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 8px;
      background: #f5a118;
      color: #0b0906;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
  <script>
    window.location.replace('https://ops.nauti-labs.com/');
  </script>
</head>
<body>
  <main>
    <img src="/assets/triton-mark.svg" alt="Triton mark">
    <h1>Triton Dashboard</h1>
    <p>The old demo is offline for now. Opening the live maritime operations dashboard.</p>
    <a href="https://ops.nauti-labs.com/">Continue to Triton Dashboard</a>
  </main>
</body>
</html>
